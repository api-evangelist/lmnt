      amount: 10
      currency: USD
      period: month
    quotas:
      - name: Monthly Characters Included
        type: quota
        limit: 200000
        unit: characters
        period: month
      - name: Overage Rate
        type: metered
        price: 0.05
        unit: per 1,000 characters
        description: $0.05 per 1K characters beyond monthly allotment
      - name: Rate Limits
        type: boolean
        value: false
        description: No concurrency or rate limits
      - name: Voice Clones
        type: boolean
        value: true
        description: Unlimited voice clones
      - name: Commercial License
        type: boolean
