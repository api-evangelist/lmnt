plans:
  - name: Free
    type: free
    description: >
      Free tier for developers to explore LMNT's text-to-speech API with a
      monthly character allowance. No commercial license; unlimited voice clones.
    url: https://www.lmnt.com/pricing
    price:
      amount: 0
      currency: USD
      period: month
    quotas:
      - name: Monthly Characters
        type: quota
        limit: 15000
        unit: characters
        period: month
      - name: Voice Clones
        type: boolean
        value: true
        description: Unlimited voice clones included
      - name: Commercial License
        type: boolean
        value: false
        description: No commercial use rights on free plan
  - name: Indie
    type: freemium
    description: >
      Entry-level paid plan for individual developers and small projects requiring
      commercial use rights and no rate or concurrency limits.
    url: https://www.lmnt.com/pricing
